<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe Pro</h1>
        <div class="mode-selection">
            <button id="pvp">Player vs Player</button>
            <button id="ai">Player vs Computer</button>
        </div>
        <div class="difficulty-selection">
        <h3>AI Difficulty</h3>

        <button id="easy">Easy</button>
        <button id="medium">Medium</button>
        <button id="hard">Hard</button>
    </div>
        <div class="scoreboard">
            <div class="score">
                X
                <span id="scoreX">0</span>
            </div>
            <div class="score">
                O
                <span id="scoreO">0</span>
            </div>
            <div class="score">
                Draw
                <span id="draws">0</span>
            </div>
        </div>
        <h2 id="status">Choose a Game Mode</h2>
        <p id="modeDisplay">Mode: Not Selected</p>
        <div class="board-wrapper">
           
            <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        </div>
        <div class="controls">
            <button id="restartBtn">Restart Round</button>
            <button id="newGameBtn">New Game</button>          
        </div>
        <footer>
             Developed by Mahaa Sri               
    </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>            
</body>
</html>
